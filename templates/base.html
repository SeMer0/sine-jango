<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisan & Co.</title>

    {% load static %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">ARTISAN & CO.</div>
        <div class="nav-links">
            <a href="{% url 'index' %}#menu">МЕНЮ</a>
            <a href="#">ПРО НАС</a>
            {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">ПРОФІЛЬ</a>
            {% else %}
            <a href="{% url 'login' %}">ВХІД</a>
            {% endif %}
            <a href="{% url 'cart_detail' %}"><i class="fa-solid fa-cart-shopping"></i> ({{ cart|length }})</a>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

</body>
</html>
