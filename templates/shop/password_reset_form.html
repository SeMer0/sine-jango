{% extends 'base.html' %}
{% block content %}
<section class="menu-section"><div class="profile-container">
    <h2>Скидання паролю</h2>
    <p>Введіть ваш email, і ми надішлемо інструкції.</p>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-logout-big" style="width:100%; border:none;">ВІДПРАВИТИ</button>
    </form>
</div></section>
{% endblock %}
